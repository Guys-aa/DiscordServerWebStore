<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRIM Store - 認証</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen gradient-bg flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-md w-full fade-in">
        <!-- ヘッダー -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4 pulse">
                <i class="fab fa-discord text-purple-600 text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Discord認証</h1>
            <p class="text-gray-600">Discordボットから取得したトークンを入力してください</p>
        </div>

        <!-- 認証フォーム -->
        <form id="authForm" class="space-y-6">
            <div>
                <label for="token" class="block text-sm font-medium text-gray-700 mb-2">
                    認証トークン
                </label>
                <div class="relative">
                    <input 
                        type="text" 
                        id="token" 
                        name="token"
                        required
                        placeholder="Discordボットから送信されたトークン"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-600 focus:border-transparent transition"
                    >
                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center">
                        <i class="fas fa-key text-gray-400"></i>
                    </div>
                </div>
                <p class="mt-2 text-sm text-gray-500">
                    トークンが不明な場合、Discordで <code class="bg-gray-100 px-1 rounded">/web_auth</code> を実行してください
                </p>
            </div>

            <button 
                type="submit"
                class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition flex items-center justify-center space-x-2"
            >
                <i class="fas fa-sign-in-alt"></i>
                <span>認証する</span>
            </button>
        </form>

        <!-- ローディング -->
        <div id="loading" class="hidden text-center py-8">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-purple-600"></div>
            <p class="mt-4 text-gray-600">認証中...</p>
        </div>

        <!-- 成功メッセージ -->
        <div id="success" class="hidden text-center py-8">
            <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-check text-green-600 text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-green-600 mb-2">認証成功！</h2>
            <p class="text-gray-600 mb-4">ようこそ、<span id="userName" class="font-semibold"></span>さん</p>
            <button 
                onclick="goToStore()"
                class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition"
            >
                ストアに移動
            </button>
        </div>

        <!-- エラーメッセージ -->
        <div id="error" class="hidden text-center py-8">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-red-600 text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-red-600 mb-2">認証失敗</h2>
            <p class="text-gray-600 mb-4" id="errorMessage"></p>
            <button 
                onclick="resetForm()"
                class="bg-red-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition"
            >
                もう一度試す
            </button>
        </div>

        <!-- ヘルプ -->
        <div class="mt-8 p-4 bg-blue-50 rounded-lg">
            <h3 class="font-semibold text-blue-800 mb-2">
                <i class="fas fa-info-circle mr-2"></i>認証手順
            </h3>
            <ol class="text-sm text-blue-700 space-y-1 list-decimal list-inside">
                <li>Discordサーバーに参加する</li>
                <li><code>/web_auth</code> コマンドを実行</li>
                <li>DMで送信されたトークンをコピー</li>
                <li>上記の入力欄にトークンを貼り付けて認証</li>
            </ol>
        </div>
    </div>

    <script>
        // 設定
        let API_BASE_URL = window.location.protocol + '//' + window.location.host;
        
        // 開発環境の検出
        if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            API_BASE_URL = 'http://localhost:8080';
        }
        
        // 外部環境の場合は現在のドメインを使用
        console.log('API Base URL:', API_BASE_URL);

        // フォーム送信処理
        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const token = document.getElementById('token').value.trim();
            
            if (!token) {
                showError('トークンを入力してください');
                return;
            }

            // ローディング表示
            showLoading();

            try {
                // Bot APIにトークン検証リクエスト
                const response = await fetch(`${API_BASE_URL}/api/auth/validate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ token: token })
                });

                const data = await response.json();

                if (response.ok && data.valid) {
                    // 認証成功
                    showSuccess(data.user_name);
                    
                    // ローカルストレージに認証情報を保存
                    localStorage.setItem('auth_token', token);
                    localStorage.setItem('user_info', JSON.stringify({
                        user_id: data.user_id,
                        user_name: data.user_name,
                        authenticated: true
                    }));
                    
                } else {
                    // 認証失敗
                    showError(data.message || '無効なトークンです');
                }
            } catch (error) {
                console.error('認証エラー:', error);
                showError('サーバーに接続できません。後でもう一度お試しください。');
            }
        });

        // ローディング表示
        function showLoading() {
            document.getElementById('authForm').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('success').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
        }

        // 成功表示
        function showSuccess(userName) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            document.getElementById('userName').textContent = userName;
        }

        // エラー表示
        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }

        // フォームリセット
        function resetForm() {
            document.getElementById('authForm').classList.remove('hidden');
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('success').classList.add('hidden');
            document.getElementById('error').classList.add('hidden');
            document.getElementById('token').value = '';
        }

        // ストアに移動
        function goToStore() {
            window.location.href = STORE_URL;
        }

        // ページ読み込み時に認証状態をチェック
        window.addEventListener('load', () => {
            const userInfo = localStorage.getItem('user_info');
            if (userInfo) {
                const user = JSON.parse(userInfo);
                if (user.authenticated) {
                    showSuccess(user.user_name);
                }
            }
        });
    </script>
</body>
</html>
